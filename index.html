<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NitroQuest</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <h1>NitroQuest</h1>
    <button class="login-btn">Login</button>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h2>Earn Rewards Easily</h2>
    <p>Complete tasks. Earn coins. Redeem rewards.</p>
    <button class="start-btn">Start Earning</button>
  </section>

  <!-- Stats -->
  <section class="stats">
    <div class="card">
      <h3>1.2M+</h3>
      <p>Users</p>
    </div>
    <div class="card">
      <h3>₹50L+</h3>
      <p>Rewards Paid</p>
    </div>
    <div class="card">
      <h3>500+</h3>
      <p>Tasks</p>
    </div>
  </section>

  <!-- Tasks -->
  <section class="tasks">
    <h2>Available Tasks</h2>
    <div class="task-list">
      <div class="task">
        <p>Watch a Video</p>
        <span>+50 coins</span>
      </div>
      <div class="task">
        <p>Install App</p>
        <span>+200 coins</span>
      </div>
      <div class="task">
        <p>Survey</p>
        <span>+150 coins</span>
      </div>
    </div>
  </section>

  <!-- Rewards -->
  <section class="rewards">
    <h2>Redeem Rewards</h2>
    <div class="reward-list">
      <div class="reward">Amazon Gift Card</div>
      <div class="reward">PayPal Cash</div>
      <div class="reward">Discord Nitro</div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 NitroQuest</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
